server:
  port: 8085

spring:
  application:
    name: mall-cart
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: dev
  redis:
    host: dingchunru.cn
    port: 6379

logging:
  level:
    com.mall.cart: debug

jwt:
  secret: mall-secret-key-must-be-at-least-32-bytes-long!!
  access-token-expiration: 1800
  refresh-token-expiration: 604800
  issuer: mall-server