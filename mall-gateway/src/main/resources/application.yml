server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.web.servlet.WebMvcAutoConfiguration
      - org.springframework.boot.autoconfigure.web.servlet.error.ErrorMvcAutoConfiguration
  application:
    name: mall-gateway
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: mall-auth
          uri: lb://mall-auth
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
        - id: mall-user
          uri: lb://mall-user
          predicates:
            - Path=/api/user/**
          filters:
            - name: JwtAuthentication
            - name: Logging
              args:
                logHeaders: true
        - id: mall-product
          uri: lb://mall-product
          predicates:
            - Path=/api/product/**
            - name: Custom
              args:
                startTime: "00:00"
                endTime: "23:59"
                version: v1
          filters:
            - name: JwtAuthentication
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
        - id: mall-order
          uri: lb://mall-order
          predicates:
            - Path=/api/order/**
          filters:
            - name: JwtAuthentication
        - id: mall-cart
          uri: lb://mall-cart
          predicates:
            - Path=/api/cart/**
          filters:
            - name: JwtAuthentication
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 5
        - id: mall-seckill
          uri: lb://mall-seckill
          predicates:
            - Path=/api/seckill/**
            - After=2024-01-01T00:00:00+08:00[Asia/Shanghai]
          filters:
            - name: JwtAuthentication
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 1
        - id: mall-search
          uri: lb://mall-search
          predicates:
            - Path=/api/search/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
  redis:
    host: dingchunru.cn
    port: 6379
    password: 7259.Dcr.

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    com.mall.gateway: INFO
    org.springframework.cloud.gateway: WARN
    org.springframework: WARN
  file:
    path: /var/log/mall/gateway
    max-size: 100MB
    max-history: 30

jwt:
  secret: mall-secret-key-must-be-at-least-32-bytes-long!!
  access-token-expiration: 1800
  refresh-token-expiration: 604800
  issuer: mall-server