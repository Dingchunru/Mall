server:
  port: 8086

spring:
  application:
    name: mall-seckill
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://dingchunru.cn:3306/Mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: dingchunru
    password: 7259.Dcr.
  redis:
    host: dingchunru.cn
    port: 6379
    password: 7259.Dcr.
    database: 0
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

rocketmq:
  name-server: dingchunru.cn:9876
  producer:
    group: mall-seckill-producer
    send-message-timeout: 3000
    retry-times-when-send-failed: 3
  consumer:
    group: mall-seckill-consumer
    pull-batch-size: 32
    max-reconsume-times: 16

mybatis-plus:
  type-aliases-package: com.mall.seckill.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.mall.seckill: INFO
    com.mall.seckill.mapper: WARN
    org.springframework: WARN
    com.baomidou.mybatisplus: WARN
    com.alibaba.nacos: WARN
    org.apache.rocketmq: WARN
  file:
    path: /var/log/mall/seckill
    max-size: 100MB
    max-history: 30

jwt:
  secret: mall-secret-key-must-be-at-least-32-bytes-long!!
  access-token-expiration: 1800
  refresh-token-expiration: 604800
  issuer: mall-server